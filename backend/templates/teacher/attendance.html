{% extends "base.html" %}

{% block content %}

<h1>Attendance</h1>

<!-- ================= SELF ATTENDANCE ================= -->
<div class="card">
    <h3>My Attendance</h3>

    <select id="self_schedule"></select>

    <select id="self_status">
        <option value="present">Present</option>
        <option value="absent">Absent</option>
    </select>

    <button onclick="markSelf()">Mark</button>
</div>

<hr>

<!-- ================= STUDENT ATTENDANCE ================= -->
<h3>Mark Students</h3>

<select id="schedule"></select>
<button onclick="loadStudents()">Load Students</button>

<br><br>

<div id="students"></div>

<button onclick="submit()">Submit</button>

<script>

let selected = {};
let studentIds = [];
let teacherSchedule = [];

// ================= LOAD SCHEDULE =================
(async () => {
    const data = await API("/schedule/teacher");

    teacherSchedule = data.schedule;

    const options = teacherSchedule.map(s => `
        <option value="${s.class_id}_${s.period}">
            ${s.day} | P${s.period} | Class ${s.class_id}
        </option>
    `).join("");

    // both dropdowns use same data
    document.getElementById("schedule").innerHTML = options;
    document.getElementById("self_schedule").innerHTML = options;
})();

// ================= SELF ATTENDANCE =================
async function markSelf() {

    const val = document.getElementById("self_schedule").value;
    if (!val) return alert("Select schedule");

    const [class_id, period] = val.split("_").map(Number);
    const status = document.getElementById("self_status").value;

    await API("/attendance/teacher/self", "POST", {
        class_id,
        period,
        status
    }, true);

    alert("Attendance marked");
}

// ================= LOAD STUDENTS =================
async function loadStudents() {

    const val = document.getElementById("schedule").value;
    if (!val) return alert("Select schedule");

    const [class_id, period] = val.split("_").map(Number);
    selected = { class_id, period };

    const res = await API("/attendance/teacher/students");

    const filtered = res.attendance.filter(r => r.class_id == class_id);

    const seen = {};
    studentIds = [];

    filtered.forEach(s => {
        if (!seen[s.student_id]) {
            seen[s.student_id] = true;
            studentIds.push(s.student_id);
        }
    });

    if (!studentIds.length) {
        document.getElementById("students").innerHTML = "No students found";
        return;
    }

    document.getElementById("students").innerHTML =
        studentIds.map(id => `
            <div style="margin-bottom:6px;">
                Student ${id}
                <select id="s_${id}">
                    <option value="present">Present</option>
                    <option value="absent">Absent</option>
                </select>
            </div>
        `).join("");
}

// ================= SUBMIT STUDENT ATTENDANCE =================
async function submit() {

    if (!selected.class_id) return alert("Load students first");

    const students = studentIds.map(id => ({
        id,
        status: document.getElementById(`s_${id}`).value
    }));

    await API("/attendance/teacher/mark", "POST", {
        class_id: selected.class_id,
        period: selected.period,
        students
    }, true);

    alert("Student attendance submitted");
}

</script>

{% endblock %}

{% extends "base.html" %}
{% block content %}

<h1>My Attendance History</h1>

<!-- ===== FILTER ===== -->
<div class="card">
    <select id="period_filter"></select>
    <select id="status_filter">
        <option value="">All</option>
        <option value="present">Present</option>
        <option value="absent">Absent</option>
    </select>

    <button onclick="load()">Apply</button>
</div>

<br>

<!-- ===== SUMMARY ===== -->
<div id="summary"></div>

<br>

<!-- ===== LIST ===== -->
<div id="list"></div>

<script>

let allRecords = [];

// LOAD FILTER OPTIONS
(async () => {
    const data = await API("/schedule/teacher");

    const periods = [...new Set(data.schedule.map(s => s.period))];

    document.getElementById("period_filter").innerHTML =
        `<option value="">All Periods</option>` +
        `<option value="0">General</option>` +
        periods.map(p => `<option value="${p}">P${p}</option>`).join("");

    await load();
})();

// LOAD DATA
async function load() {

    const res = await API("/attendance/teacher/self");
    allRecords = res.attendance;

    let records = [...allRecords];

    const period = document.getElementById("period_filter").value;
    const status = document.getElementById("status_filter").value;

    if (period !== "") {
        records = records.filter(r => String(r.period) === period);
    }

    if (status) {
        records = records.filter(r => r.status === status);
    }

    // SORT (latest first)
    records.sort((a, b) => b.date.localeCompare(a.date));

    renderSummary(records);
    renderList(records);
}

// ===== SUMMARY =====
function renderSummary(records) {
    const total = records.length;
    const present = records.filter(r => r.status === "present").length;
    const absent = total - present;

    document.getElementById("summary").innerHTML =
        `Total: ${total} | Present: ${present} | Absent: ${absent}`;
}

// ===== LIST =====
function renderList(records) {

    if (!records.length) {
        document.getElementById("list").innerHTML = "No records";
        return;
    }

    document.getElementById("list").innerHTML =
        records.map(r => `
            <div class="card" style="margin-bottom:5px;">
                ${r.date} |
                ${r.period == 0 ? "General" : "P" + r.period} |
                <b>${r.status}</b>
            </div>
        `).join("");
}

</script>

{% endblock %}

{% extends "layouts/student_base.html" %}

{% block title %}Attendance{% endblock %}
{% block page_title %}Attendance{% endblock %}

{% block content %}

<div class="card">

  <table class="table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Period</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="attendance-body"></tbody>

  </table>

</div>

<script>
async function load() {
  const res = await AttendanceAPI.getStudent();

  if (!res.success) return;

  let html = "";

  res.data.forEach(a => {
    html += `
      <tr>
        <td>${a.date}</td>
        <td>${a.period}</td>
        <td>${a.status}</td>
      </tr>
    `;
  });

  document.getElementById("attendance-body").innerHTML = html;
}

load();
</script>

{% endblock %}

{% extends "layouts/admin_base.html" %}

{% block title %}Attendance{% endblock %}
{% block page_title %}Attendance{% endblock %}

{% block content %}

<div class="card">

  <h4>Student Attendance</h4>

  <table class="table">
    <thead>
      <tr>
        <th>Student</th>
        <th>Class</th>
        <th>Date</th>
        <th>Period</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="student-att"></tbody>
  </table>

</div>

<div class="card">

  <h4>Teacher Attendance</h4>

  <table class="table">
    <thead>
      <tr>
        <th>Teacher</th>
        <th>Date</th>
        <th>Period</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="teacher-att"></tbody>
  </table>

</div>

<script>
// ================= STUDENTS =================
async function loadStudentAttendance() {
  const res = await AttendanceAPI.getAdminStudents();

  if (!res.success) return;

  let html = "";

  res.data.forEach(a => {
    html += `
      <tr>
        <td>${a.student_name || a.student_id}</td>
        <td>${a.class_name || a.class_id}</td>
        <td>${a.date}</td>
        <td>${a.period}</td>
        <td>${a.status}</td>
      </tr>
    `;
  });

  document.getElementById("student-att").innerHTML = html;
}

// ================= TEACHERS =================
async function loadTeacherAttendance() {
  const res = await AttendanceAPI.getAdminTeachers();

  if (!res.success) return;

  let html = "";

  res.data.forEach(a => {
    html += `
      <tr>
        <td>${a.teacher_name || a.teacher_id}</td>
        <td>${a.date}</td>
        <td>${a.period}</td>
        <td>${a.status}</td>
      </tr>
    `;
  });

  document.getElementById("teacher-att").innerHTML = html;
}

// ================= INIT =================
loadStudentAttendance();
loadTeacherAttendance();

</script>

{% endblock %}

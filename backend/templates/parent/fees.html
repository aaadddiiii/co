{% extends "base.html" %}

{% block content %}

<h1>Fees</h1>

<select id="student"></select>

<div id="fees"></div>

<hr>

<h3>Pay Fee</h3>

<form id="form" enctype="multipart/form-data">
    <input name="fee_id" placeholder="Fee ID" required />
    <input name="amount" placeholder="Amount" required />
    <input name="txn_id" placeholder="Transaction ID" required />
    <input type="file" name="screenshot" required />
    <input name="student_id" id="student_id" hidden />
    <button>Submit</button>
</form>

<script>

let allData = [];

(async () => {
    const res = await API("/fees/parent");
    allData = res.data;

    document.getElementById("student").innerHTML =
        allData.map(s => `<option value="${s.student_id}">Student ${s.student_id}</option>`).join("");

    document.getElementById("student").onchange = load;

    load();
})();

function load() {
    const student = document.getElementById("student").value;

    document.getElementById("student_id").value = student;

    const data = allData.find(s => s.student_id == student)?.fees || [];

    document.getElementById("fees").innerHTML =
        data.map(f => `
            <div style="border:1px solid #ccc; padding:10px; margin:5px;">
                ID: ${f.id} |
                Total: ${f.total} |
                Paid: ${f.paid} |
                Status: ${f.status}
            </div>
        `).join("");
}

// SUBMIT
document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const form = new FormData(e.target);

    await API("/fees/pay", "POST", form);

    alert("Payment submitted");
    load();
};

</script>

{% endblock %}

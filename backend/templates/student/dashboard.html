{% extends "base.html" %}

{% block content %}

<h1>Dashboard</h1>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

    <div style="border:1px solid #ccc; padding:15px; width:200px;">
        <h3>Fees</h3>
        <p id="fees"></p>
    </div>

    <div style="border:1px solid #ccc; padding:15px; width:200px;">
        <h3>Attendance</h3>
        <p id="attendance"></p>
    </div>

</div>

<script>
(async () => {
    const fees = await API("/fees/student");
    const attendance = await API("/attendance/student");

    const due = fees.fees.filter(f => f.status !== "paid").length;
    document.getElementById("fees").innerText = `${due} pending`;

    const total = attendance.attendance.length;
    const present = attendance.attendance.filter(a => a.status === "present").length;

    document.getElementById("attendance").innerText =
        `${present}/${total} present`;
})();
</script>

{% endblock %}

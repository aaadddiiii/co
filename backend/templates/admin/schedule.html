{% extends "layouts/admin_base.html" %}

{% block title %}Schedule{% endblock %}
{% block page_title %}Schedule{% endblock %}

{% block content %}

<!-- CREATE -->
<div class="card">

    <h4>Create Schedule</h4>

    <div class="form-row">

        <select id="day">
            <option value="">Day</option>
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
        </select>

        <input id="period" placeholder="Period">

        <input id="subject" placeholder="Subject">

        <select id="teacher_id"></select>

        <select id="class_id"></select>

        <button onclick="createSchedule()">Add</button>

    </div>

</div>

<!-- TABLE -->
<div class="card">

    <h4>Schedule</h4>

    <table class="table">
        <thead>
            <tr>
                <th>Day</th>
                <th>Period</th>
                <th>Subject</th>
                <th>Teacher</th>
                <th>Class</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="schedule-body"></tbody>

    </table>

</div>

<script>
    // ================= LOAD DROPDOWNS =================
    async function loadTeachers() {
        const res = await request("/teachers");

        if (!res.success) return;

        let html = `<option value="">Teacher</option>`;

        res.data.forEach(t => {
            html += `<option value="${t.id}">${t.name}</option>`;
        });

        teacher_id.innerHTML = html;
    }

    async function loadClasses() {
        const res = await request("/classes");

        if (!res.success) return;

        let html = `<option value="">Class</option>`;

        res.data.forEach(c => {
            html += `<option value="${c.id}">${c.name}</option>`;
        });

        class_id.innerHTML = html;
    }

    // ================= LOAD TABLE =================
    async function loadSchedule() {
        const res = await ScheduleAPI.getAll();

        if (!res.success) return;

        let html = "";

        res.data.forEach(s => {
            html += `
      <tr>
        <td>${s.day}</td>
        <td>${s.period}</td>
        <td>${s.subject}</td>
        <td>${s.teacher_name || s.teacher_id}</td>
        <td>${s.class_name || s.class_id}</td>
        <td>
          <button onclick="deleteSchedule(${s.id})">Delete</button>
        </td>
      </tr>
    `;
        });

        el("schedule-body").innerHTML = html;
    }

    // ================= CREATE =================
    async function createSchedule() {
        if (!day.value || !period.value || !subject.value || !teacher_id.value || !class_id.value) {
            alert("Fill all fields");
            return;
        }

        const f = new FormData();

        f.append("day", day.value);
        f.append("period", period.value);
        f.append("subject", subject.value);
        f.append("teacher_id", teacher_id.value);
        f.append("class_id", class_id.value);
        f.append("start_time", "10:00");
        f.append("end_time", "11:00");

        const res = await ScheduleAPI.create(f);

        if (!res.success) {
            alert(res.error || "Failed");
            return;
        }

        // reset
        day.value = "";
        period.value = "";
        subject.value = "";
        teacher_id.value = "";
        class_id.value = "";

        loadSchedule();
    }

    // ================= DELETE =================
    async function deleteSchedule(id) {
        if (!confirm("Delete this schedule?")) return;

        const res = await ScheduleAPI.delete(id);

        if (!res.success) {
            alert("Delete failed");
            return;
        }

        loadSchedule();
    }

    // ================= INIT =================
    loadTeachers();
    loadClasses();
    loadSchedule();

</script>

{% endblock %}

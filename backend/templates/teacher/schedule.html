{% extends "base.html" %}

{% block content %}

<h1>Weekly Timetable</h1>

<table border="1" cellpadding="10">
    <thead>
        <tr>
            <th>Period</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
            <th>Saturday</th>
            <th>Sunday</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script>

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

(async () => {
    const data = await API("/schedule/teacher");
    const schedule = data.schedule;

    // find max period
    const maxPeriod = Math.max(...schedule.map(s => s.period));

    // map: period → day → subject
    const map = {};
    schedule.forEach(s => {
        if (!map[s.period]) map[s.period] = {};
        map[s.period][s.day] = s;
    });

    let html = "";

    for (let p = 1; p <= maxPeriod; p++) {
        html += `<tr><td>P${p}</td>`;

        days.forEach(day => {
            const s = map[p]?.[day];

            html += `<td>${
                s ? `${s.subject}<br>Class ${s.class_id}` : "-"
            }</td>`;
        });

        html += `</tr>`;
    }

    document.getElementById("table").innerHTML = html;
})();

</script>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<h1>Attendance</h1>

<select id="period"></select>
<button onclick="load()">Filter</button>

<br><br>

<div id="summary"></div>
<hr>
<div id="list"></div>

<script>

(async () => {
    const data = await API("/schedule/student");
    const periods = [...new Set(data.schedule.map(s => s.period))];

    document.getElementById("period").innerHTML =
        `<option value="">All</option>` +
        periods.map(p => `<option value="${p}">P${p}</option>`).join("");

    load();
})();

async function load() {
    const period = document.getElementById("period").value;

    const data = await API("/attendance/student");

    let records = data.attendance;

    if (period) {
        records = records.filter(r => r.period == period);
    }

    const total = records.length;
    const present = records.filter(r => r.status === "present").length;

    document.getElementById("summary").innerHTML =
        `Present: ${present} / ${total}`;

    document.getElementById("list").innerHTML =
        records.map(r => `
            <div>
                ${r.date} | P${r.period} | ${r.status}
            </div>
        `).join("") || "No records";
}

</script>

{% endblock %}

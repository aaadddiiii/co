{% extends "base.html" %}

{% block content %}

<h1>Schedule</h1>

<!-- ================= FILTER ================= -->
<div class="card">
    <h3>Filter</h3>

    <select id="filter_class"></select>
    <select id="filter_teacher"></select>

    <button onclick="load()">Apply</button>
</div>

<hr>

<!-- ================= GRID ================= -->
<h3>Weekly Schedule</h3>

<table>
    <thead>
        <tr>
            <th>P</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
            <th>Sat</th>
            <th>Sun</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<hr>

<!-- ================= CREATE ================= -->
<div class="card">
    <h3>Create Schedule</h3>

    <form id="form">

        <select name="day" required>
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
            <option>Sunday</option>
        </select>

        <input name="period" type="number" placeholder="Period" required />

        <input name="subject" placeholder="Subject" required />

        <!-- NEW -->
        <input name="start_time" id="start_time" placeholder="HH:MM" required />
        <input name="end_time" id="end_time" placeholder="HH:MM" required />

        <select name="teacher_id" id="teacher" required></select>
        <select name="class_id" id="class" required></select>

        <button>Create</button>
    </form>
</div>


<script>

    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    let teachers = [];
    let classes = [];
    let schedule = [];

    // LOAD INITIAL DATA
    (async () => {
        teachers = await API("/teachers");
        classes = await API("/classes");

        // populate dropdowns
        document.getElementById("teacher").innerHTML =
            teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join("");

        document.getElementById("class").innerHTML =
            classes.map(c => `<option value="${c.id}">${c.name}</option>`).join("");

        // filters
        document.getElementById("filter_teacher").innerHTML =
            `<option value="">All Teachers</option>` +
            teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join("");

        document.getElementById("filter_class").innerHTML =
            `<option value="">All Classes</option>` +
            classes.map(c => `<option value="${c.id}">${c.name}</option>`).join("");

        load();
    })();

    // CREATE
    document.getElementById("form").onsubmit = async (e) => {
        e.preventDefault();

        await API("/schedule/create", "POST", new FormData(e.target));

        e.target.reset();
        load();
    };

    // LOAD + FILTER
    async function load() {
        const data = await API("/schedule/all");
        schedule = data;

        const t = document.getElementById("filter_teacher").value;
        const c = document.getElementById("filter_class").value;

        let filtered = schedule;

        if (t) filtered = filtered.filter(s => s.teacher_id == t);
        if (c) filtered = filtered.filter(s => s.class_id == c);

        render(filtered);
    }

    // RENDER GRID
    function render(data) {
        const table = document.getElementById("table");

        if (!data || !data.length) {
            table.innerHTML = "<tr><td colspan='8'>No schedule</td></tr>";
            return;
        }

        // get only used periods
        const periods = [...new Set(data.map(s => s.period))]
            .sort((a, b) => a - b);

        // map → period → day → schedule
        const map = {};
        data.forEach(s => {
            if (!map[s.period]) map[s.period] = {};
            map[s.period][s.day] = s;
        });

        let html = "";

        periods.forEach(p => {
            html += `<tr><td>P${p}</td>`;

            days.forEach(d => {
                const s = map[p]?.[d];

                if (s) {
                    html += `
                    <td>
                        <b>${s.subject}</b><br>
                        T:${s.teacher_id} | C:${s.class_id}<br>
                        <button onclick="del(${s.id})">X</button>
                    </td>
                `;
                } else {
                    html += `<td>-</td>`;
                }
            });

            html += `</tr>`;
        });

        table.innerHTML = html;
    }
    

    // DELETE
    async function del(id) {
        if (!confirm("Delete?")) return;

        const form = new FormData();
        form.append("id", id);

        await API("/schedule/delete", "POST", form);
        load();
    }

    // ================= AUTO TIME =================

    const timeMap = {
        1: ["10:00", "11:00"],
        2: ["11:00", "12:00"],
        3: ["12:00", "13:00"],
        4: ["14:00", "15:00"],
        5: ["15:00", "16:00"]
    };

    const periodInput = document.querySelector("input[name='period']");
    const start = document.getElementById("start_time");
    const end = document.getElementById("end_time");

    let manualOverride = false;

    // detect manual typing
    start.addEventListener("input", () => manualOverride = true);
    end.addEventListener("input", () => manualOverride = true);

    // auto fill ONLY if user hasn't touched time
    periodInput.addEventListener("input", () => {
        if (manualOverride) return;

        const p = parseInt(periodInput.value);

        if (timeMap[p]) {
            start.value = timeMap[p][0];
            end.value = timeMap[p][1];
        } else {
            start.value = "";
            end.value = "";
        }
    });

</script>

{% endblock %}

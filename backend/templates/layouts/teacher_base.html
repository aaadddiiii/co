<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}Teacher{% endblock %}</title>

  <link rel="stylesheet" href="/static/css/style.css">

  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Teacher</h2>

    <nav>
      <a href="/teacher/dashboard">Dashboard</a>
      <a href="/teacher/schedule">Schedule</a>
      <a href="/teacher/attendance">Attendance</a>
    </nav>

    <button onclick="logout()">Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h3>{% block page_title %}{% endblock %}</h3>
    </div>

    <div class="content">
      {% block content %}{% endblock %}
    </div>

  </main>

</div>

</body>
</html>
